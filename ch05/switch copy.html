<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>switch</title>
    </head>
    <body>
        <input id="input_number" type="text" />
        <button id="btn" type="button">확인</button>
        <div id="print"></div>
    </body>
</html>
<script>
    
    document.getElementById("btn").onclick = function () {
        
        let score = document.getElementById("input_number").value;
        let result = null;

        switch (Math.floor(score/10)) {
            case 9:
                result = "A";
                break;
            case 8:
                result = "B";
                break;
            case 7:
                result = "C";
                break;
            case 6:
                result = "D";
                break;
            case 5:
                result = "F";
                break;
            default:
                result = "올바른 점수(0~100)를 입력하세요.";
                break;
        }
        
        document.getElementById("print").textContent = result;
    };
</script>
